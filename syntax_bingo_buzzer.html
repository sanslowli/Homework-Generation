<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syntax Bingo™ Buzzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0e;
    color: white;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    overflow: hidden;
  }

  /* ── 상단 타이틀 ── */
  .brand {
    position: fixed;
    top: 22px;
    letter-spacing: 4px;
    font-size: 12px;
    color: #333;
    text-transform: uppercase;
  }

  /* ── 결과 표시 ── */
  .result-display {
    font-size: 130px;
    font-weight: 900;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2a2a2a;
    transition: color 0.08s, text-shadow 0.08s;
    margin-bottom: 10px;
    line-height: 1;
  }
  .result-display.show-O {
    color: #4CAF50;
    text-shadow: 0 0 80px #4CAF5070;
  }
  .result-display.show-X {
    color: #f44336;
    text-shadow: 0 0 80px #f4433670;
  }
  .result-display.show-timeout {
    color: #FF9800;
    text-shadow: 0 0 80px #FF980070;
  }

  /* ── 타이머 링 ── */
  .timer-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 36px;
  }
  .timer-svg { transform: rotate(-90deg); }

  .ring-bg   { fill: none; stroke: #1e1e1e; stroke-width: 10; }
  .ring-fill {
    fill: none;
    stroke: #4CAF50;
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke 0.3s;
  }

  .timer-num {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 68px;
    font-weight: 800;
    line-height: 1;
    transition: color 0.3s;
  }

  .timer-label {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    color: #444;
    text-transform: uppercase;
  }

  /* ── O / X 버튼 ── */
  .btn-row {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
  }

  .btn-ox {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid;
    font-size: 56px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.1s, box-shadow 0.1s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    line-height: 1;
  }

  .btn-O {
    border-color: #2e6b31;
    color: #4CAF50;
  }
  .btn-O:hover  { background: #1a3a1a; }
  .btn-O.active {
    background: #4CAF50;
    border-color: #4CAF50;
    color: white;
    box-shadow: 0 0 40px #4CAF5060;
    transform: scale(1.06);
  }

  .btn-X {
    border-color: #6b2e2e;
    color: #f44336;
  }
  .btn-X:hover  { background: #3a1a1a; }
  .btn-X.active {
    background: #f44336;
    border-color: #f44336;
    color: white;
    box-shadow: 0 0 40px #f4433660;
    transform: scale(1.06);
  }

  /* ── 컨트롤 버튼 ── */
  .ctrl-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .btn-ctrl {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1.5px solid #2a2a2a;
    background: #161616;
    color: #666;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .btn-ctrl:hover { border-color: #555; color: #ccc; }
  .btn-ctrl.playing {
    border-color: #FF9800;
    color: #FF9800;
  }

  /* ── 키 힌트 ── */
  .hints {
    display: flex;
    gap: 18px;
    color: #333;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .hint kbd {
    display: inline-block;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    font-size: 11px;
    margin-right: 3px;
    color: #555;
  }

  /* ── 설정 패널 ── */
  .settings {
    position: fixed;
    bottom: 22px;
    right: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #333;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .settings input[type="number"] {
    width: 52px;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #888;
    padding: 4px 8px;
    font-size: 14px;
    text-align: center;
    outline: none;
  }
  .settings input[type="number"]:focus {
    border-color: #555;
    color: white;
  }

  /* ── 플래시 오버레이 ── */
  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
  }

  /* ── 애니메이션 ── */
  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%  { transform: translateX(-12px); }
    40%  { transform: translateX(12px); }
    60%  { transform: translateX(-8px); }
    80%  { transform: translateX(8px); }
  }
  .anim-pop   { animation: pop   0.28s ease; }
  .anim-shake { animation: shake 0.38s ease; }

  /* ── 타임아웃 메시지 ── */
  .timeout-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: 700;
    color: #FF9800;
    letter-spacing: 3px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="brand">Syntax Bingo™ &nbsp;·&nbsp; Judge Mode</div>

<div class="flash" id="flash"></div>

<!-- 결과 표시 -->
<div class="result-display" id="resultDisplay">—</div>

<!-- 타이머 링 -->
<div class="timer-wrap" id="timerWrap">
  <svg class="timer-svg" width="200" height="200" viewBox="0 0 200 200">
    <circle class="ring-bg"   cx="100" cy="100" r="88"/>
    <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="88"/>
  </svg>
  <div class="timer-num"   id="timerNum">10</div>
  <div class="timer-label" id="timerLabel">대기 중</div>
</div>

<!-- O / X 버튼 -->
<div class="btn-row">
  <button class="btn-ox btn-O" id="btnO" onclick="triggerO()">O</button>
  <button class="btn-ox btn-X" id="btnX" onclick="triggerX()">✕</button>
</div>

<!-- 컨트롤 -->
<div class="ctrl-row">
  <button class="btn-ctrl" id="btnToggle" onclick="toggleTimer()">▶ 시작 &nbsp;[Space]</button>
  <button class="btn-ctrl" onclick="resetTurn()">↺ 다음 턴 &nbsp;[R]</button>
</div>

<!-- 키 힌트 -->
<div class="hints">
  <div class="hint"><kbd>O</kbd>통과</div>
  <div class="hint"><kbd>X</kbd>실패</div>
  <div class="hint"><kbd>Space</kbd>타이머 시작/일시정지</div>
  <div class="hint"><kbd>R</kbd>다음 턴</div>
</div>

<!-- 설정 -->
<div class="settings">
  제한시간
  <input type="number" id="durInput" value="10" min="3" max="99" onchange="onDurChange()">
  초
</div>

<script>
// ════════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════════
let _actx = null;

function getCtx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}

function osc(ctx, type, freq, vol, start, dur) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, start);
  g.gain.setValueAtTime(vol, start);
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  o.start(start); o.stop(start + dur);
}

// ✅ 통쾌한 벨 화음 (C장조 트리아드)
function playO() {
  const ctx = getCtx(), t = ctx.currentTime;
  osc(ctx, 'sine', 1046, 0.55, t,       1.3); // C6
  osc(ctx, 'sine', 1318, 0.28, t,       1.0); // E6
  osc(ctx, 'sine', 1568, 0.18, t,       0.7); // G6
  osc(ctx, 'sine', 2093, 0.10, t+0.05,  0.4); // C7 sparkle
}

// ❌ 거친 버저
function playX() {
  const ctx = getCtx(), t = ctx.currentTime;
  osc(ctx, 'sawtooth', 155, 0.28, t,      0.75);
  osc(ctx, 'sawtooth', 195, 0.22, t,      0.75);
  osc(ctx, 'sawtooth', 235, 0.16, t,      0.75);
  osc(ctx, 'square',   80,  0.12, t,      0.5);  // low thud
}

// 🕐 째깍 (urgent 여부로 음높이 달라짐)
function playTick(urgent) {
  const ctx = getCtx(), t = ctx.currentTime;
  osc(ctx, 'square', urgent ? 1500 : 950, urgent ? 0.22 : 0.10, t, 0.035);
}

// ⏰ 타임아웃 알람 → X버저
function playTimeout() {
  const ctx = getCtx(), t = ctx.currentTime;
  [0, 0.18, 0.36].forEach(d => osc(ctx, 'square', 660, 0.35, t + d, 0.13));
  setTimeout(() => playX(), 650);
}

// ════════════════════════════════════════
//  TIMER ENGINE
// ════════════════════════════════════════
const CIRCUMFERENCE = 2 * Math.PI * 88; // r = 88

let duration    = 10;
let timeLeft    = 10;
let running     = false;
let interval    = null;
let lastTickSec = -1;

const ringFill  = document.getElementById('ringFill');
const timerNum  = document.getElementById('timerNum');
const timerLabel= document.getElementById('timerLabel');
const timerWrap = document.getElementById('timerWrap');
const btnToggle = document.getElementById('btnToggle');

ringFill.style.strokeDasharray  = CIRCUMFERENCE;
ringFill.style.strokeDashoffset = 0;

function renderTimer() {
  const frac = Math.max(0, timeLeft / duration);
  ringFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);

  const ceil = Math.ceil(timeLeft);
  timerNum.textContent = ceil <= 0 ? '0' : ceil;

  // 색상 단계
  if (timeLeft <= 3) {
    ringFill.style.stroke = '#f44336';
    timerNum.style.color  = '#f44336';
  } else if (timeLeft <= 6) {
    ringFill.style.stroke = '#FF9800';
    timerNum.style.color  = '#FF9800';
  } else {
    ringFill.style.stroke = '#4CAF50';
    timerNum.style.color  = 'white';
  }
}

function startTimer() {
  if (running) return;
  running = true;
  lastTickSec = Math.ceil(timeLeft);
  btnToggle.textContent = '⏸ 일시정지  [Space]';
  btnToggle.classList.add('playing');
  timerLabel.textContent = '진행 중';

  interval = setInterval(() => {
    timeLeft = Math.max(0, timeLeft - 0.1);

    // 째깍 사운드: 마지막 6초부터
    const sec = Math.ceil(timeLeft);
    if (sec !== lastTickSec && timeLeft > 0) {
      lastTickSec = sec;
      if (timeLeft <= 6) playTick(timeLeft <= 3);
    }

    renderTimer();

    if (timeLeft <= 0) {
      clearInterval(interval);
      running = false;
      timerLabel.textContent = '시간 초과';
      btnToggle.textContent = '▶ 시작  [Space]';
      btnToggle.classList.remove('playing');
      onTimeout();
    }
  }, 100);
}

function pauseTimer() {
  if (!running) return;
  clearInterval(interval);
  running = false;
  btnToggle.textContent = '▶ 계속  [Space]';
  btnToggle.classList.remove('playing');
  timerLabel.textContent = '일시정지';
}

function toggleTimer() {
  getCtx(); // 오디오 컨텍스트 언락
  if (running) pauseTimer();
  else startTimer();
}

function resetTurn() {
  clearInterval(interval);
  running   = false;
  timeLeft  = duration;
  lastTickSec = -1;

  renderTimer();
  timerLabel.textContent = '대기 중';
  timerNum.style.color   = 'white';
  ringFill.style.stroke  = '#4CAF50';

  btnToggle.textContent  = '▶ 시작  [Space]';
  btnToggle.classList.remove('playing');

  document.getElementById('resultDisplay').textContent = '—';
  document.getElementById('resultDisplay').className   = 'result-display';
  document.getElementById('btnO').classList.remove('active');
  document.getElementById('btnX').classList.remove('active');
}

function onTimeout() {
  playTimeout();
  setTimeout(() => {
    showResult('timeout');
  }, 650);
}

function onDurChange() {
  const v = parseInt(document.getElementById('durInput').value) || 10;
  duration = Math.min(99, Math.max(3, v));
  if (!running) {
    timeLeft = duration;
    renderTimer();
    timerLabel.textContent = '대기 중';
  }
}

// ════════════════════════════════════════
//  OX LOGIC
// ════════════════════════════════════════
function showResult(type) {
  const display = document.getElementById('resultDisplay');
  const flash   = document.getElementById('flash');
  const btnO    = document.getElementById('btnO');
  const btnX    = document.getElementById('btnX');

  // 이전 애니메이션 클래스 제거 (재트리거용)
  display.classList.remove('anim-pop', 'anim-shake');
  void display.offsetWidth; // reflow

  if (type === 'O') {
    display.textContent = 'O';
    display.className   = 'result-display show-O';
    flash.style.background = '#4CAF5022';
    display.classList.add('anim-pop');
    btnO.classList.add('active');
    btnX.classList.remove('active');
  } else if (type === 'X') {
    display.textContent = '✕';
    display.className   = 'result-display show-X';
    flash.style.background = '#f4433622';
    display.classList.add('anim-shake');
    btnX.classList.add('active');
    btnO.classList.remove('active');
  } else { // timeout
    display.textContent = '시간 초과';
    display.style.fontSize = '64px';
    display.className   = 'result-display show-timeout';
    flash.style.background = '#FF980022';
    display.classList.add('anim-shake');
    btnX.classList.add('active');
    btnO.classList.remove('active');
    setTimeout(() => { display.style.fontSize = ''; }, 1500);
  }

  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 220);
}

function triggerO() {
  getCtx();
  pauseTimer();
  playO();
  showResult('O');
}

function triggerX() {
  getCtx();
  pauseTimer();
  playX();
  showResult('X');
}

// ════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.repeat) return;

  switch (e.key.toLowerCase()) {
    case 'o':      e.preventDefault(); triggerO();    break;
    case 'x':      e.preventDefault(); triggerX();    break;
    case ' ':      e.preventDefault(); toggleTimer(); break;
    case 'r':      e.preventDefault(); resetTurn();   break;
    case 'arrowup':
      e.preventDefault();
      duration = Math.min(99, duration + 1);
      document.getElementById('durInput').value = duration;
      if (!running) { timeLeft = duration; renderTimer(); }
      break;
    case 'arrowdown':
      e.preventDefault();
      duration = Math.max(3, duration - 1);
      document.getElementById('durInput').value = duration;
      if (!running) { timeLeft = duration; renderTimer(); }
      break;
  }
});

// 초기 렌더
renderTimer();
</script>
</body>
</html>
