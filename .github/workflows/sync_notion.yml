name: Sync Notion → SentenceBank

# 실행 방법:
#   1. GitHub 레포 → Actions → "Sync Notion → SentenceBank" → Run workflow (수동)
#   2. 노션 버튼 → webhook → 자동 트리거
#   3. 매일 KST 04:00 자동 (안전망)
#
# 작업 내용:
#   노션 예문 DB 읽기 → 회색·취소선 제거 → 챕터 매핑 적용 →
#   구글 시트의 SentenceBank 탭에 전체 교체 기록

on:
  workflow_dispatch:           # 수동 실행 + 노션 webhook 트리거용
  schedule:
    - cron: '0 19 * * *'       # 매일 UTC 19:00 = KST 04:00 (안전망)

permissions:
  contents: read               # 시트만 쓰니까 레포 commit 불필요

# 동시에 여러 번 트리거되어도 한 번에 하나만
concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests gspread oauth2client

      - name: Write Google service account key
        env:
          GCP_SERVICE_KEY_JSON: ${{ secrets.GCP_SERVICE_KEY_JSON }}
        run: |
          printf '%s' "$GCP_SERVICE_KEY_JSON" > service_key.json

      - name: Run sync_notion.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python sync_notion.py

      - name: Clean up secret files
        if: always()
        run: rm -f service_key.json

      - name: Summary
        run: echo "✅ 노션 → SentenceBank 동기화 완료. 시트에서 확인하세요."
